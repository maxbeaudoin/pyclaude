name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check
      - name: Format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --dev
      - name: Type check
        run: uv run pyright
      - name: Test
        run: uv run pytest
