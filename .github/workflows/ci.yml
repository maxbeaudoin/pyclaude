name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyright
      - run: uv run pytest
